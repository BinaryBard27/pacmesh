<!DOCTYPE html>
<html>
<head><title>PacMesh Test</title></head>
<body style="background:#111;color:#0f0;font-family:monospace;padding:20px">
<h1>PacMesh Test Page</h1>
<p id="msg">Loading...</p>
<canvas id="c" width="400" height="400" style="border:2px solid #2121de;display:block;margin-top:10px"></canvas>
<script>
document.getElementById('msg').textContent = 'JavaScript loaded OK';

const c = document.getElementById('c');
const ctx = c.getContext('2d');
ctx.fillStyle = '#000';
ctx.fillRect(0,0,400,400);
ctx.fillStyle = '#2121de';
ctx.fillRect(50,50,100,100);
ctx.fillStyle = '#ffff00';
ctx.beginPath();
ctx.arc(200,200,20,0,Math.PI*2);
ctx.fill();
document.getElementById('msg').textContent = 'Canvas drawn OK';
</script>
</body>
</html>
